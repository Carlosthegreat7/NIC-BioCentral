<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Test</title>

    </head>
    <style>
        .card {
  width: 300px;
  border-radius: 12px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: box-shadow 0.3s ease;
  cursor: pointer;
}

/* Container to clip the image if you want a sliding effect */
.image-container {
  overflow: hidden;
  height: 200px;
}

.card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  /* Initial state */
  transform: translateY(0); 
  transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

/* Hover State */
.card:hover .card-image {
  /* For "sliding up", use a negative value */
  transform: translateY(-10px); 
}

/* Optional: Add a lift to the card itself */
.card:hover {
  box-shadow: 0 12px 24px rgba(0,0,0,0.15);
}
    </style>
    <body>
        <h1>Test</h1>
        <p>This is a test page.</p>

        <div class="card">
            <div class="image-container">
                <img src="your-image.jpg" alt="Card Image" class="card-image">
            </div>
            <div class="card-content">
                <h3>Project Title</h3>
                <p>Brief description goes here.</p>
            </div>
        </div>
    </body>
</html>
