{% extends "base.html" %}

{% block content %}
<style>
  /* Updated BioCentral Theme */
  :root {
    --bento-card-bg: rgba(255, 255, 255, 0.05);
    --input-bg: rgba(255, 255, 255, 0.1);
    --btn-bg: rgba(255, 255, 255, 0.15);
    --btn-hover: rgba(255, 255, 255, 0.25);
    --text-main: #ffffff;
  }

  /* --- Pure CSS Master Wrapper --- */
  .dashboard-wrapper {
    flex: 1;
    /* Instructs wrapper to take all exact space between header and footer */
    display: flex;
    align-items: center;
    /* Locks grid vertically to the center */
    justify-content: center;
    /* Locks grid horizontally to the center */
    width: 100%;
    padding: 2rem;
    box-sizing: border-box;
    overflow: hidden;
    /* Kills the phantom horizontal scrollbar entirely */
  }

  /* --- Login Screen Styles --- */
  .biocentral-login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    gap: 2.5rem;
  }

  .bento-card {
    background: var(--bento-card-bg);
    border-radius: 24px;
    width: 360px;
    height: 380px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 2.5rem;
    opacity: 0;
    transform: translateY(50px);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .pop-up-left {
    animation: popUpAnim 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .pop-up-right {
    animation: popUpAnim 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 0.15s;
  }

  @keyframes popUpAnim {
    0% {
      opacity: 0;
      transform: translateY(50px);
    }

    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .minimal-form {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }

  .minimal-input {
    width: 85%;
    padding: 14px 24px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50px;
    background: var(--input-bg);
    color: var(--text-main);
    font-size: 1rem;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    outline: none;
  }

  .minimal-input::placeholder {
    color: #a0a0a0;
  }

  .minimal-input:focus {
    transform: scale(1.04);
    border-color: rgba(255, 255, 255, 0.5);
    background: rgba(255, 255, 255, 0.15);
  }

  .minimal-btn {
    width: 60%;
    padding: 14px 24px;
    margin-top: 1.5rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50px;
    background: var(--btn-bg);
    color: #ffffff;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  .minimal-btn:hover {
    background: var(--btn-hover);
    transform: translateY(-4px);
  }

  /* --- FLUID Wireframe Dashboard Grid --- */
  .wireframe-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2rem;
    width: 100%;
    max-width: 1400px;
    /* Limits width to maintain the tall pillar look from the wireframe */
    height: 60vh;
    /* Enforces exactly 60% of the screen height */
    min-height: 400px;
    /* Safety fallback for tiny displays */
  }

  .bio-card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 40px;
    /* Increased rounding to match wireframe pills exactly */
    padding: 2.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    height: 100%;

    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
      box-shadow 0.4s ease,
      border-color 0.4s ease,
      background 0.4s ease;
  }

  .bio-card:hover {
    transform: translateY(-16px);
    box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4),
      0 0 0 1px rgba(255, 255, 255, 0.2) inset;
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.25);
  }

  .bio-card-label {
    font-size: 1.15rem;
    font-weight: 500;
    color: #ffffff;
    line-height: 1.4;
    margin-bottom: auto;
  }

  .bio-card-subtext {
    display: block;
    font-size: 0.85rem;
    color: #a0a0a0;
    margin-top: 6px;
    font-weight: 400;
  }

  .wireframe-x {
    flex-grow: 1;
    width: 100%;
    margin-top: 2rem;
    border-radius: 12px;
    background:
      linear-gradient(to top left, transparent calc(50% - 1px), rgba(255, 255, 255, 0.1) calc(50%), transparent calc(50% + 1px)),
      linear-gradient(to top right, transparent calc(50% - 1px), rgba(255, 255, 255, 0.1) calc(50%), transparent calc(50% + 1px));
    background-color: rgba(0, 0, 0, 0.2);
  }

  @media (max-width: 1200px) {
    .wireframe-grid {
      grid-template-columns: repeat(2, 1fr);
      height: auto;
    }

    .bio-card {
      height: 400px;
    }
  }

  @media (max-width: 600px) {
    .wireframe-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<div id="loading-overlay"
  style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30,30,47,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
  <div class="spinner-premium mb-3" style="border-color: #fff; border-top-color: transparent;"></div>
  <h5 class="font-weight-bold" style="letter-spacing: 2px; color: var(--text-main);">AUTHENTICATING</h5>
</div>

<div class="dashboard-wrapper">
  {% if not session['sdr_loggedin'] %}

  <div class="biocentral-login-wrapper">
    <div class="bento-card pop-up-left">
      <form id="login-form" method="POST" class="minimal-form">
        <input type="text" name="username" class="minimal-input" placeholder="Username" required>
        <input type="password" name="password" class="minimal-input" placeholder="Password" required>
        <button type="submit" class="minimal-btn">Login</button>
      </form>
    </div>

    <div class="bento-card pop-up-right" style="padding: 0;">
      <div class="wireframe-x" style="margin: 20px; height: calc(100% - 40px); width: calc(100% - 40px);">
      </div>
    </div>
  </div>

  {% else %}

  <div class="wireframe-grid">
    <div class="bio-card" onclick="window.location.href='/connect-device'">
      <div class="bio-card-label">Connect to a Store Device</div>
      <div class="wireframe-x"></div>
    </div>

    <div class="bio-card" onclick="window.location.href='/register-employee'">
      <div class="bio-card-label">Register new employee</div>
      <div class="wireframe-x"></div>
    </div>

    <div class="bio-card" onclick="window.location.href='/move-registration'">
      <div class="bio-card-label">
        Copy Employee Data
        <!-- <span class="bio-card-subtext">(copy employee data)</span> -->
      </div>
      <div class="wireframe-x"></div>
    </div>

    <div class="bio-card" onclick="window.location.href='/reset-time'">
      <div class="bio-card-label">Sync Device's Time</div>
      <div class="wireframe-x"></div>
    </div>
  </div>

  {% endif %}
</div>

<script>
  const loginForm = document.getElementById('login-form');
  if (loginForm) {
    loginForm.addEventListener('submit', () => {
      document.getElementById('loading-overlay').style.display = 'flex';
    });
  }
</script>
{% endblock %}
