<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <title>Bio-Central</title>

    <link rel="icon" href="{{ url_for('static', filename='Newtrends.png') }}" type="image/x-icon">

    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='bootstrap/js/jquery-3.3.1.min.js') }}"></script>
    <script src="{{ url_for('static', filename='bootstrap/js/popper.js') }}"></script>
    <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.min.js') }}"></script>

    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/all.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/fontawesome.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/fontawesome-free-6.7.2-web/css/all.css') }}">

    <style>
        /* Universal Box Sizing */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #15151e 100%);
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow-x: hidden;
        }

        /* Sticky Header */
        .bento-header {
            position: sticky;
            top: 0;
            z-index: 1050;
            background: rgba(18, 18, 30, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0 2rem;
            height: 72px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04), 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        /* Animated top border removed */

        /* Brand */
        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .header-brand:hover {
            opacity: 0.85;
            text-decoration: none;
        }

        .brand-logo-wrap {
            width: 40px;
            height: 40px;
            background: #ffffff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .brand-logo-wrap img {
            height: 22px;
            width: auto;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .brand-name {
            font-size: 1.0625rem;
            font-weight: 700;
            color: #f1f1f1;
            letter-spacing: -0.01em;
        }

        .brand-sub {
            font-size: 0.6875rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        /* Nav area */
        .header-nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link-item {
            display: flex;
            align-items: center;
            gap: 7px;
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.8125rem;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-link-item i {
            font-size: 0.75rem;
        }

        .nav-link-item:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.08);
            text-decoration: none;
        }

        .nav-link-item.active {
            color: #a5b4fc;
            background: rgba(99, 102, 241, 0.12);
            border-color: rgba(99, 102, 241, 0.25);
        }

        .nav-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.08);
            margin: 0 4px;
        }

        /* Burger menu button */
        .custom-dropdown {
            position: relative;
            display: inline-block;
        }

        .custom-pill-btn {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            width: 40px;
            height: 40px;
            padding: 0;
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            flex-direction: column;
            gap: 5px;
        }

        .custom-pill-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.18);
            color: #fff;
        }

        .custom-pill-btn.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.35);
        }

        /* Burger lines */
        .burger-line {
            display: block;
            width: 18px;
            height: 2px;
            background: currentColor;
            border-radius: 2px;
            transition: all 0.25s ease;
            transform-origin: center;
        }

        .custom-pill-btn.active .burger-line:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .custom-pill-btn.active .burger-line:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }

        .custom-pill-btn.active .burger-line:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        /* Dropdown menu */
        .custom-dropdown-menu {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            min-width: 210px;
            background: rgba(22, 22, 38, 0.97);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 14px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(99, 102, 241, 0.1);
            padding: 0.5rem;
            z-index: 1060;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px) scale(0.96);
            transform-origin: top right;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        .custom-dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        /* Dropdown header label */
        .dropdown-label {
            font-size: 0.6375rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.25);
            padding: 6px 12px 4px;
        }

        .custom-dropdown-item {
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.65);
            padding: 9px 12px;
            text-decoration: none;
            font-size: 0.8375rem;
            font-weight: 500;
            border-radius: 9px;
            transition: all 0.15s ease;
            gap: 10px;
        }

        .custom-dropdown-item .item-icon {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .custom-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            text-decoration: none;
        }

        .custom-dropdown-item.danger {
            color: rgba(252, 129, 129, 0.8);
        }

        .custom-dropdown-item.danger:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #fc8181;
        }

        .custom-dropdown-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 0.4rem 0;
        }

        /* Alert Glass Effect */
        .alert-glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Floating Back to Top */
        .btn-back-to-top {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99;
            background: rgba(77, 163, 255, 0.2);
            color: white;
            border: 1px solid rgba(77, 163, 255, 0.4);
            backdrop-filter: blur(5px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-back-to-top:hover {
            background: rgba(77, 163, 255, 0.4);
            transform: translateY(-5px);
        }
    </style>
</head>

<body>
    {% if session['sdr_loggedin'] %}
    <header class="bento-header">
        <a href="{{ url_for('index') }}" class="header-brand">
            <div class="brand-logo-wrap">
                <img src="{{ url_for('static', filename='newtrendslogo.png') }}" alt="Logo">
            </div>
            <div class="brand-text">
                <span class="brand-name">NIC BioCentral</span>
                <span class="brand-sub">Biometrics System</span>
            </div>
        </a>

        <nav class="header-nav">
            <div class="custom-dropdown">
                <div class="custom-pill-btn" id="optionsToggleBtn" title="Menu">
                    <span class="burger-line"></span>
                    <span class="burger-line"></span>
                    <span class="burger-line"></span>
                </div>
                <div class="custom-dropdown-menu" id="optionsDropdownMenu">
                    <div class="dropdown-label">Navigation</div>
                    <a class="custom-dropdown-item" href="/device-manager">
                        <div class="item-icon" style="background: rgba(139,180,247,0.12); color: #8bb4f7;">
                            <i class="fas fa-server"></i>
                        </div>
                        Device Manager
                    </a>
                    <a class="custom-dropdown-item" href="/audit-logs">
                        <div class="item-icon" style="background: rgba(160,160,160,0.1); color: #a0a0a0;">
                            <i class="fas fa-file-invoice"></i>
                        </div>
                        Audit Logs
                    </a>
                    <div class="custom-dropdown-divider"></div>
                    <a class="custom-dropdown-item danger" href="{{ url_for('logout') }}">
                        <div class="item-icon" style="background: rgba(239,68,68,0.1); color: #fc8181;">
                            <i class="fas fa-sign-out-alt"></i>
                        </div>
                        Logout
                    </a>
                </div>
            </div>
        </nav>
    </header>
    {% endif %}

    <main class="flex-shrink-0">
        {% for mess in get_flashed_messages() %}
        <div class="container mt-4">
            <div class="alert alert-dismissible fade show border-0 alert-glass" role="alert">
                <i class="fas fa-info-circle mr-2"></i> {{ mess }}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close"
                    style="color: #fff; opacity: 0.8;">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
        </div>
        {% endfor %}

        {% block content %}{% endblock %}
    </main>

    <button id="backToTop" class="btn-back-to-top" title="Go to top">
        <i class="fas fa-arrow-up"></i>
    </button>


    <footer class="page-footer mt-auto py-4">
        <div class="footer-copyright text-center small" style="color: #777; letter-spacing: 0.3px;">
            © 2026 MIS Department |
            <span id="companySignature" style="cursor: pointer; transition: color 0.2s;">
                Newtrends International Corporation
            </span>
        </div>
    </footer>

    <script>
        // Custom Dropdown Logic
        document.addEventListener('DOMContentLoaded', function () {
            const toggleBtn = document.getElementById('optionsToggleBtn');
            const dropdownMenu = document.getElementById('optionsDropdownMenu');

            if (toggleBtn && dropdownMenu) {
                toggleBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    const isShown = dropdownMenu.classList.contains('show');
                    dropdownMenu.classList.toggle('show');
                    toggleBtn.classList.toggle('active');
                });

                document.addEventListener('click', function (e) {
                    if (!toggleBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                        dropdownMenu.classList.remove('show');
                        toggleBtn.classList.remove('active');
                    }
                });
            }
        });

        // Scroll to Top logic
        var backToTopBtn = document.getElementById("backToTop");
        window.onscroll = function () {
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                backToTopBtn.style.display = "block";
            } else {
                backToTopBtn.style.display = "none";
            }
        };
        backToTopBtn.onclick = function () {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Developed By Animation (Easter Egg)
        $(document).ready(function () {
            let isAnimating = false;
            $('#companySignature').click(function () {
                if (isAnimating) return;
                isAnimating = true;

                const $this = $(this);
                const originalText = "Newtrends International Corporation";
                const devText = "Developed By: CarlosTheGreat & carinokarlos";

                let deleteInterval = setInterval(function () {
                    let currentText = $this.text();
                    if (currentText.length > 0) {
                        $this.text(currentText.slice(0, -1));
                    } else {
                        clearInterval(deleteInterval);
                        $this.css({ 'color': '#4da3ff', 'font-weight': 'bold' });

                        let i = 0;
                        let typeInterval = setInterval(function () {
                            $this.text(devText.substring(0, i + 1));
                            i++;
                            if (i === devText.length) {
                                clearInterval(typeInterval);
                                setTimeout(function () {
                                    $this.text(originalText).css({ 'color': '', 'font-weight': '' });
                                    isAnimating = false;
                                }, 3000);
                            }
                        }, 50);
                    }
                }, 30);
            });
        });
    </script>
</body>

</html>
