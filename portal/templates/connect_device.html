{% extends "base.html" %}

{% block content %}
<style>
    /* --- Pop-In Animation --- */
    @keyframes popIn {
        0% {
            opacity: 0;
            transform: scale(0.9) translateY(30px);
        }

        100% {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    }

    .pop-in-container {
        animation: popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Staggered delays for internal elements */
    .stagger-1 {
        animation-delay: 0.1s;
        opacity: 0;
    }

    .stagger-2 {
        animation-delay: 0.2s;
        opacity: 0;
    }

    /* --- Page Layout --- */
    .manager-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 2rem;
        box-sizing: border-box;
    }

    .manager-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 40px;
        padding: 3rem;
        width: 100%;
        max-width: 1200px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }
</style>

<div class="manager-wrapper">
    <div class="manager-card pop-in-container">
        <h2 class="welcome-title pop-in-container stagger-1">Device Manager</h2>
        <p class="welcome-subtitle pop-in-container stagger-2">Configure and monitor ZKTeco biometric terminals.</p>
    </div>
</div>
{% endblock %}
